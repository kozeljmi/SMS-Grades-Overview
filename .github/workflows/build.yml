name: Build & Release

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package

      - name: Get version
        id: version
        run: echo "version=$(node -e 'console.log(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: |
            sms-grades-chrome.zip
            sms-grades-firefox.zip

      - uses: actions/upload-artifact@v4
        with:
          name: sms-grades-chrome
          path: sms-grades-chrome.zip

      - uses: actions/upload-artifact@v4
        with:
          name: sms-grades-firefox
          path: sms-grades-firefox.zip
